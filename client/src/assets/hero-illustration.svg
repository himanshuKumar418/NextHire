  <line x1="365" y1="150" x2="405" y2="200" stroke="#475569" strokeWidth="2" />
  <line x1="325" y1="210" x2="305" y2="260" stroke="#475569" strokeWidth="2" />
  <line x1="325" y1="210" x2="345" y2="260" stroke="#475569" strokeWidth="2" />
  
  <!-- Tree Nodes (Circles & Labels) -->
  <!-- Root Node (50) -->
  <circle cx="365" cy="150" r="16" fill="#1e293b" stroke="#38bdf8" strokeWidth="2" />
  <text x="365" y="154" fill="#38bdf8" fontSize="11" fontFamily="monospace" fontWeight="bold" textAnchor="middle">50</text>
  
  <!-- Left Child (30) -->
  <circle cx="325" cy="210" r="16" fill="#1e293b" stroke="#38bdf8" strokeWidth="2" />
  <text x="325" y="214" fill="#38bdf8" fontSize="11" fontFamily="monospace" fontWeight="bold" textAnchor="middle">30</text>
  
  <!-- Right Child (70) -->
  <circle cx="405" cy="210" r="16" fill="#1e293b" stroke="#38bdf8" strokeWidth="2" />
  <text x="405" y="214" fill="#38bdf8" fontSize="11" fontFamily="monospace" fontWeight="bold" textAnchor="middle">70</text>
  
  <!-- Left-Left Child (20) -->
  <circle cx="305" cy="270" r="16" fill="#1e293b" stroke="#38bdf8" strokeWidth="2" />
