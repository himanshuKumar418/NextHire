  <rect x="40" y="100" width="90" height="8" rx="4" fill="#f43f5e" />
  
  <!-- Line 2:     def __init__(self, key): -->
  <rect x="65" y="120" width="160" height="8" rx="4" fill="#a855f7" />
  
  <!-- Line 3:         self.left = None -->
  <rect x="90" y="140" width="130" height="8" rx="4" fill="#38bdf8" />
  
  <!-- Line 4:         self.right = None -->
  <rect x="90" y="160" width="140" height="8" rx="4" fill="#38bdf8" />
  
  <!-- Line 5:         self.val = key -->
  <rect x="90" y="180" width="120" height="8" rx="4" fill="#38bdf8" />

  <!-- Line 6:     def insert(root, key): -->
  <rect x="65" y="210" width="150" height="8" rx="4" fill="#a855f7" />
  
  <!-- Line 7:         if root is None: -->
  <rect x="90" y="230" width="120" height="8" rx="4" fill="#f43f5e" />
  
  <!-- Line 8:             return Node(key) -->
  <rect x="115" y="250" width="130" height="8" rx="4" fill="#10b981" />

  <!-- Graph / Tree Data Structure Visual Representation on the Right -->
  <!-- Outer panel for visualization -->
  <rect x="270" y="90" width="190" height="250" rx="8" fill="#0f172a" stroke="#334155" strokeWidth="1.5" />
  <text x="365" y="115" fill="#64748b" fontSize="12" fontFamily="sans-serif" fontWeight="bold" textAnchor="middle">BST SEARCH</text>
  
